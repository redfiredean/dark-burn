.cp { position:absolute; bottom:22px; display:grid; grid-template-columns:repeat(3,64px); grid-template-rows:repeat(2,64px); gap:6px; }
.cp.L{left:14px;}.cp.R{right:14px;}
.btn{width:64px;height:64px;background:rgba(255,255,255,0.10);border:1.5px solid rgba(255,255,255,0.20);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;user-select:none;-webkit-user-select:none;box-shadow:0 4px 16px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.15);}

<script>
// ══════════════════════════════════════════════════════════
// SHARED AUDIO CONTEXT
// ══════════════════════════════════════════════════════════
let AC;
function getAC(){
  if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}

// ══════════════════════════════════════════════════════════
// SFX
// ══════════════════════════════════════════════════════════
const SFX=(()=>{
  const tone=(f,type,dur,vol,f2)=>{
    const a=getAC(),o=a.createOscillator(),g=a.createGain();
    o.type=type;o.connect(g);g.connect(a.destination);
    o.frequency.setValueAtTime(f,a.currentTime);
    if(f2) o.frequency.exponentialRampToValueAtTime(f2,a.currentTime+dur);
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);
    o.start();o.stop(a.currentTime+dur);
  };
  const noise=(dur,vol,lp)=>{
    const a=getAC(),n=Math.floor(a.sampleRate*dur),buf=a.createBuffer(1,n,a.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
    const s=a.createBufferSource(),f=a.createBiquadFilter(),g=a.createGain();
    f.type='lowpass';f.frequency.setValueAtTime(lp,a.currentTime);
    f.frequency.exponentialRampToValueAtTime(60,a.currentTime+dur);
    s.buffer=buf;s.connect(f);f.connect(g);g.connect(a.destination);
    g.gain.setValueAtTime(vol,a.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);
    s.start();
  };
  return {
    init:()=>getAC(),
    laser:  ()=>{tone(1600,'sawtooth',0.1,0.18,280);},
    hit:    ()=>{tone(320,'square',0.08,0.4,55);noise(0.08,0.2,400);},
    jump:   ()=>{tone(200,'sine',0.12,0.1,800);},
    land:   ()=>{tone(110,'sine',0.07,0.18,70);},
    crumble:()=>{noise(0.18,0.3,900);tone(180,'square',0.12,0.15,40);},
    explode:()=>{noise(0.55,1.0,600);tone(65,'sine',0.4,0.6,22);},
    throw:  ()=>{tone(280,'sine',0.08,0.15,180);noise(0.06,0.1,800);},
    bomb:   ()=>{noise(0.06,0.25,1200);tone(600,'sawtooth',0.05,0.2,200);},
    win:    ()=>{[520,660,780,1040].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.28,0.28),i*110));},
    charge: (t)=>{// t 0..1 — rising pitch power-up tone
      const f1=180+t*520,f2=f1+80;
      tone(f1,'sine',0.08,0.06+t*0.06,f2);
    }
  };
})();

// ══════════════════════════════════════════════════════════
// MUSIC — Tron-inspired upbeat electronic
// ══════════════════════════════════════════════════════════
const Music=(()=>{
  let playing=false,masterGain=null,droneNode=null,lfoNode=null;
  const BPM=140,BEAT=60/BPM;

  const start=()=>{
    if(playing) return;
    playing=true;
    const a=getAC();
    masterGain=a.createGain();masterGain.gain.value=0;masterGain.connect(a.destination);
    masterGain.gain.linearRampToValueAtTime(0.18,a.currentTime+1.5);

    // Pulsing synth drone with filter sweep
    droneNode=a.createOscillator();
    const dFilter=a.createBiquadFilter();
    dFilter.type='bandpass';dFilter.frequency.value=220;dFilter.Q.value=3;
    const dGain=a.createGain();dGain.gain.value=0.28;
    droneNode.type='sawtooth';droneNode.frequency.value=110;
    lfoNode=a.createOscillator();const lfoG=a.createGain();
    lfoNode.frequency.value=0.5;lfoG.gain.value=60;
    lfoNode.connect(lfoG);lfoG.connect(dFilter.frequency);
    droneNode.connect(dFilter);dFilter.connect(dGain);dGain.connect(masterGain);
    droneNode.start();lfoNode.start();

    let t=a.currentTime+0.05;
    const sched=()=>{
      if(!playing) return;
      // 16-step Tron-style pattern
      for(let i=0;i<16;i++){
        const bt=t+i*(BEAT/2);
        // Kick: 0,4,8,12
        if(i%4===0) mkick(bt);
        // Open hi-hat: off-beats
        if(i%2===1) mhat(bt,0.08);
        // Closed hi-hat: every step
        mhat(bt,0.04);
        // Snare: 4, 12
        if(i===4||i===12) msnare(bt);
        // Synth lead arpeggio — Tron-like intervals
        const ARG=[0,7,12,7,5,12,7,5, 3,7,10,7,5,10,7,3];
        const SCALE=[220,246.9,261.6,293.7,329.6,349.2,392,440];
        const ni=ARG[i]; if(ni<SCALE.length) msynth(bt,SCALE[ni%SCALE.length],BEAT*0.4);
        // Bass: beats 0,2,4,6...
        if(i%2===0) mbass(bt,i);
      }
      t+=16*(BEAT/2);
      setTimeout(sched,(t-a.currentTime-0.4)*1000);
    };
    sched();
  };

  const mkick=(t)=>{
    const a=getAC(),n=Math.floor(a.sampleRate*0.15);
    const buf=a.createBuffer(1,n,a.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(n*0.12));
    const s=a.createBufferSource(),f=a.createBiquadFilter(),g=a.createGain();
    f.type='lowpass';f.frequency.value=100;
    g.gain.setValueAtTime(1.8,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    s.buffer=buf;s.connect(f);f.connect(g);g.connect(masterGain);s.start(t);
    // pitch-drop click
    const o=a.createOscillator(),og=a.createGain();
    o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(40,t+0.1);
    og.gain.setValueAtTime(0.9,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    o.connect(og);og.connect(masterGain);o.start(t);o.stop(t+0.15);
  };
  const msnare=(t)=>{
    const a=getAC(),n=Math.floor(a.sampleRate*0.08);
    const buf=a.createBuffer(1,n,a.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(n*0.05));
    const s=a.createBufferSource(),f=a.createBiquadFilter(),g=a.createGain();
    f.type='bandpass';f.frequency.value=1800;f.Q.value=0.8;
    g.gain.setValueAtTime(0.7,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    s.buffer=buf;s.connect(f);f.connect(g);g.connect(masterGain);s.start(t);
  };
  const mhat=(t,vol)=>{
    const a=getAC(),n=Math.floor(a.sampleRate*0.025);
    const buf=a.createBuffer(1,n,a.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(n*0.03));
    const s=a.createBufferSource(),f=a.createBiquadFilter(),g=a.createGain();
    f.type='highpass';f.frequency.value=9000;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.025);
    s.buffer=buf;s.connect(f);f.connect(g);g.connect(masterGain);s.start(t);
  };
  const msynth=(t,freq,dur)=>{
    const a=getAC(),o=a.createOscillator(),f=a.createBiquadFilter(),g=a.createGain();
    o.type='square';o.frequency.value=freq;
    f.type='lowpass';f.frequency.setValueAtTime(freq*4,t);f.frequency.exponentialRampToValueAtTime(freq*1.2,t+dur);
    f.Q.value=2;
    g.gain.setValueAtTime(0.14,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(f);f.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+0.02);
  };
  const BASS_FREQS=[55,55,65.4,55,73.4,55,65.4,49];
  const mbass=(t,i)=>{
    const a=getAC(),o=a.createOscillator(),g=a.createGain();
    o.type='sawtooth';o.frequency.value=BASS_FREQS[i%BASS_FREQS.length];
    g.gain.setValueAtTime(0.32,t);g.gain.exponentialRampToValueAtTime(0.001,t+BEAT*0.6);
    o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+BEAT*0.65);
  };
  const stop=()=>{
    playing=false;
    if(masterGain) masterGain.gain.setTargetAtTime(0,getAC().currentTime,0.5);
  };
  return {start,stop};
})();

}

// ══════════════════════════════════════════════════════════
// PLATFORM CHUNK — cell-grid: each cell is a collision zone
// Cells explode into particles when destroyed
// ══════════════════════════════════════════════════════════
class PlatformChunk{
  constructor(def){
    this.def=def;this.id=def.id;this.isFlame=!!def.isFlame;
    this.p2d=new Path2D(SVG_PATHS[def.id]);
    this.cells=[];
    this.reset();
  }
  _buildCells(){
    const b=this.def.bbox;
    // More cells = finer breakup. Letters: 3x3, flame: 4x4
    const cols=this.isFlame?4:3, rows=3;
    this.cells=[];
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      const lw=b.w/cols, lh=b.h/rows;
      const lx=b.x+c*lw, ly=b.y+r*lh;
      // World bounding box of this cell
      const wx1=this.wx+(lx-b.x)*SCALE;
      const wy1=this.wy+(ly-b.y)*SCALE;
      this.cells.push({
        lx,ly,lw,lh,         // SVG-space cell rect
        wx1,wy1,             // world top-left
        ww:lw*SCALE, wh:lh*SCALE,
        alive:true
      });
    }
  }
  reset(){
    const b=this.def.bbox;
    this.wx=platX+b.x*SCALE;this.wy=platY+b.y*SCALE;
    this.ww=b.w*SCALE;this.wh=b.h*SCALE;
    this.hp=this.cells.length||1; // one hp per cell
    this.state='intact';this.flashT=0;
    this._buildCells();
    this.hp=this.cells.length;
  }
  _burstCell(cell, ix, iy, explosive){
    if(!cell.alive) return;
    cell.alive=false;
    const fcols=this.isFlame
      ?['#eb5f40','#e41f13','#ff7744','#cc2200','#ff9966','#ff5522','#ffaa44']
      :['#ffffff','#e8e8e8','#d8d8d8','#cccccc','#f0f0f0'];
    const n=explosive?10:6;
    for(let i=0;i<n;i++){
      const ang=Math.random()*Math.PI*2;
      const spd=(explosive?140:80)+Math.random()*(explosive?260:140);
      // 1/5 the old size: max was ~2.2, now max ~0.45
      const sz=0.2+Math.random()*0.45;
      const col=fcols[Math.floor(Math.random()*fcols.length)];
      const px=cell.wx1+(Math.random()*cell.ww);
      const py=cell.wy1+(Math.random()*cell.wh);
      fragments.push(new Fragment(px,py,
        Math.cos(ang)*spd+(ix||0)*0.15*spd,
        Math.sin(ang)*spd-40+(iy||0)*0.15*spd,
        col,sz,0,'tri'));
    }
  }
  hit(ix,iy,worldHitX,worldHitY){
    if(this.state==='gone') return false;
    this.flashT=0.1; SFX.crumble();
    // Find alive cell nearest hit point
    const hx=worldHitX!==undefined?worldHitX:this.wx+this.ww*0.5;
    const hy=worldHitY!==undefined?worldHitY:this.wy+this.wh*0.5;
    const alive=this.cells.filter(c=>c.alive);
    alive.sort((a,b)=>{
      const da=Math.hypot(a.wx1+a.ww/2-hx,a.wy1+a.wh/2-hy);
      const db=Math.hypot(b.wx1+b.ww/2-hx,b.wy1+b.wh/2-hy);
      return da-db;
    });
    if(alive.length>0){
      this._burstCell(alive[0],ix,iy,false);
      this.hp--;
    }
    if(this.hp<=0||alive.length===0){
      // Burst remaining cells
      this.cells.filter(c=>c.alive).forEach(c=>this._burstCell(c,ix,iy,true));
      this.state='gone';
      spawnLargeShards(this,ix,iy);
      screenShake=Math.max(screenShake,this.isFlame?10:5);
      SFX.explode();
    }
    return true;
  }
  explodeAway(){
    if(this.state==='gone') return;
    this.cells.forEach(c=>this._burstCell(c,0,-1,true));
    this.state='gone';
    spawnLargeShards(this,0,0);
    spawnExplosion(this.wx+this.ww/2,this.wy+this.wh/2,'#ff4400');
    screenShake=Math.max(screenShake,8);
    SFX.explode();
  }
  update(dt){
    if(this.flashT>0) this.flashT-=dt;
  }
  _drawFillStyle(isFlash){
    if(this.isFlame){
      const g=ctx.createLinearGradient(82.86,50.71,82.86,1);
      if(isFlash){g.addColorStop(0,'#fff');g.addColorStop(1,'#fff');}
      else if(fireActive){
        const fp=0.5+0.5*Math.sin(Date.now()*0.009);
        g.addColorStop(0,`hsl(${15+fp*20},100%,${55+fp*20}%)`);
        g.addColorStop(0.5,`hsl(${8+fp*10},100%,${45+fp*15}%)`);
        g.addColorStop(1,`hsl(${3+fp*5},100%,${35+fp*10}%)`);
      } else {g.addColorStop(0,'#eb5f40');g.addColorStop(1,'#e41f13');}
      return g;
    }
    const dmg=1-this.hp/this.cells.length;
    return isFlash?'#fff':`rgba(255,255,255,${Math.max(0.3,1-dmg*0.55)})`;
  }
  draw(){
    if(this.state==='gone') return;
    const b=this.def.bbox;
    const aliveCells=this.cells.filter(c=>c.alive);
    if(aliveCells.length===0) return;

    ctx.save();
    ctx.translate(this.wx,this.wy); ctx.scale(SCALE,SCALE); ctx.translate(-b.x,-b.y);
    ctx.fillStyle=this._drawFillStyle(this.flashT>0);
    for(const cell of aliveCells){
      ctx.save();
      ctx.beginPath(); ctx.rect(cell.lx-0.5,cell.ly-0.5,cell.lw+1,cell.lh+1); ctx.clip();
      ctx.fill(this.p2d);
      ctx.restore();
    }
    // Glow
    if(this.isFlame){
      const pulse=fireActive?(28+18*Math.sin(Date.now()*0.009)):18;
      ctx.shadowBlur=pulse;
      ctx.shadowColor=fireActive?`rgba(255,${60+80*Math.sin(Date.now()*0.009)},0,1)`:'#ff4400';
      for(const cell of aliveCells){
        ctx.save(); ctx.beginPath(); ctx.rect(cell.lx-0.5,cell.ly-0.5,cell.lw+1,cell.lh+1); ctx.clip();
        ctx.fillStyle='transparent'; ctx.fill(this.p2d); ctx.restore();
      }
    } else if(this.hp===this.cells.length){
      ctx.shadowBlur=5; ctx.shadowColor='rgba(255,255,255,0.2)';
      for(const cell of aliveCells){
        ctx.save(); ctx.beginPath(); ctx.rect(cell.lx-0.5,cell.ly-0.5,cell.lw+1,cell.lh+1); ctx.clip();
        ctx.fillStyle='transparent'; ctx.fill(this.p2d); ctx.restore();
      }
    }
    ctx.restore();
  }
  // Expose per-cell collision boxes for characters/bullets
  get aliveCells(){ return this.cells.filter(c=>c.alive); }
  get top(){return this.wy;}
  get bot(){return this.wy+this.wh;}
  get lft(){return this.wx;}
  get rgt(){return this.wx+this.ww;}
}

// ══════════════════════════════════════════════════════════
// GRENADE — glowing orb, max 2 per player
// ══════════════════════════════════════════════════════════
class Grenade{
  constructor(x,y,vx,vy,owner,col){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.owner=owner;this.col=col;this.alive=true;
    this.t=0;this.trail=[];
  }
  update(dt){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>14) this.trail.shift();
    this.vy+=GRAVITY*dt*0.75;this.x+=this.vx*dt;this.y+=this.vy*dt;
    this.vx*=0.9995;this.t+=dt;
    if(this.x<8){this.x=8;this.vx=Math.abs(this.vx)*0.5;}
    if(this.x>W-8){this.x=W-8;this.vx=-Math.abs(this.vx)*0.5;}
    for(const c of chunks){
      if(c.state==='gone') continue;
      for(const cell of c.aliveCells){
        if(this.x>cell.wx1-8&&this.x<cell.wx1+cell.ww+8&&this.y+10>cell.wy1&&this.y-10<cell.wy1+cell.wh){this.explode();return;}
      }
    }
    if(this.y>H-8){this.explode();return;}
    for(const ch of characters){
      if(ch.state==='dead') continue;
      if(Math.abs(ch.x-this.x)<18&&Math.abs((ch.y-CHAR_H/2)-this.y)<24){this.explode();return;}
    }
  }
  explode(){
    this.alive=false;
    spawnBigExplosion(this.x,this.y,this.col);
    SFX.explode();screenShake=Math.max(screenShake,16);
    const R=150;
    // Ripple shockwave rings
    for(let r=0;r<5;r++){
      setTimeout(()=>{spawnRipple(this.x,this.y,this.col,r*28);},r*60);
    }
    for(const ch of characters){
      if(ch.state==='dead') continue;
      const dx=ch.x-this.x,dy=(ch.y-CHAR_H/2)-this.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<R){ch.die();}// instant kill in radius
    }
    for(const c of chunks){
      if(c.state==='gone') continue;
      const cx=c.wx+c.ww/2,cy=c.wy+c.wh/2;
      if(Math.abs(cx-this.x)<R*1.4&&Math.abs(cy-this.y)<R){c.hit(cx-this.x,cy-this.y,cx,cy);}
    }
  }
  draw(){
    ctx.save();
    // Trail
    for(let i=1;i<this.trail.length;i++){
      const a=(i/this.trail.length)*0.5;
      ctx.globalAlpha=a*0.45;ctx.shadowBlur=8;ctx.shadowColor=this.col;
      ctx.strokeStyle=this.col;ctx.lineWidth=2.5*(i/this.trail.length);
      ctx.beginPath();ctx.moveTo(this.trail[i-1].x,this.trail[i-1].y);
      ctx.lineTo(this.trail[i].x,this.trail[i].y);ctx.stroke();
    }
    ctx.globalAlpha=1;
    // Outer glow
    const pulse=0.85+0.15*Math.sin(this.t*12);
    ctx.shadowBlur=24*pulse;ctx.shadowColor=this.col;
    // Core orb
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,10*pulse);
    g.addColorStop(0,'#ffffff');g.addColorStop(0.3,this.col);g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,10*pulse,0,Math.PI*2);ctx.fill();
    // Second outer ring
    ctx.shadowBlur=30;ctx.shadowColor=this.col;
    ctx.strokeStyle=this.col;ctx.lineWidth=1.5;ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.arc(this.x,this.y,14*pulse,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;ctx.restore();
  }
}

// ══════════════════════════════════════════════════════════
// BOMB — glowing orb from sky
// ══════════════════════════════════════════════════════════
class Bomb{
  constructor(){
    this.x=80+Math.random()*(W-160);this.y=-25;
    this.vy=100+Math.random()*60;this.vx=(Math.random()-.5)*30;
    this.t=0;this.alive=true;this.trail=[];
    this.col=`hsl(${Math.random()*60},100%,55%)`;// warm orange-yellow
  }
  update(dt){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>12) this.trail.shift();
    this.vy+=GRAVITY*dt*0.22;this.x+=this.vx*dt;this.y+=this.vy*dt;
    this.t+=dt;
    if(this.x<15){this.x=15;this.vx=Math.abs(this.vx);}
    if(this.x>W-15){this.x=W-15;this.vx=-Math.abs(this.vx);}
    for(const c of chunks){
      if(c.state==='gone') continue;
      for(const cell of c.aliveCells){
        if(this.x>cell.wx1-12&&this.x<cell.wx1+cell.ww+12&&this.y+14>cell.wy1&&this.y-14<cell.wy1+cell.wh){this.explode();return;}
      }
    }
    if(this.y>H){this.explode();}
    // Kill characters
    for(const ch of characters){
      if(ch.state==='dead') continue;
      if(Math.abs(ch.x-this.x)<18&&Math.abs((ch.y-CHAR_H/2)-this.y)<22){this.explode();return;}
    }
  }
  explode(){
    this.alive=false;
    spawnBigExplosion(this.x,this.y,this.col);
    SFX.explode();screenShake=Math.max(screenShake,10);
    for(let r=0;r<4;r++) setTimeout(()=>spawnRipple(this.x,this.y,this.col,r*22),r*55);
    const R=190;
    for(const ch of characters){
      if(ch.state==='dead') continue;
      const dx=ch.x-this.x,dy=(ch.y-CHAR_H/2)-this.y;
      if(Math.sqrt(dx*dx+dy*dy)<R) ch.die();// instant kill
    }
    for(const c of chunks){
      if(c.state!=='intact') continue;
      const cx=c.wx+c.ww/2,cy=c.wy+c.wh/2;
      if(Math.abs(cx-this.x)<R*1.5&&Math.abs(cy-this.y)<R){
        // Hit each chunk 3 times for massive destruction
        c.hit(cx-this.x,cy-this.y,cx,cy);
        c.hit(cx-this.x,cy-this.y,cx,cy);
        c.hit(cx-this.x,cy-this.y,cx,cy);
      }
    }
  }
  draw(){
    ctx.save();
    // Trail
    for(let i=1;i<this.trail.length;i++){
      const a=(i/this.trail.length)*0.45;
      ctx.globalAlpha=a*0.4;ctx.strokeStyle=this.col;ctx.lineWidth=3*(i/this.trail.length);
      ctx.shadowBlur=10;ctx.shadowColor=this.col;
      ctx.beginPath();ctx.moveTo(this.trail[i-1].x,this.trail[i-1].y);
      ctx.lineTo(this.trail[i].x,this.trail[i].y);ctx.stroke();
    }
    ctx.globalAlpha=1;
    const pulse=0.88+0.12*Math.sin(this.t*9);
    ctx.shadowBlur=28*pulse;ctx.shadowColor=this.col;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,12*pulse);
    g.addColorStop(0,'#ffffff');g.addColorStop(0.25,this.col);g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,12*pulse,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=this.col;ctx.lineWidth=1.5;ctx.globalAlpha=0.4;
    ctx.beginPath();ctx.arc(this.x,this.y,18*pulse,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;ctx.restore();
  }
}

// ══════════════════════════════════════════════════════════
// CHARACTER
// ══════════════════════════════════════════════════════════
class Character{
  constructor(def,pIdx,sx,sy){
    this.def=def;this.pIdx=pIdx;
    this.color=def.color;this.glow=def.glow;this.name=def.name;
    this.x=sx;this.y=sy;this.vx=0;this.vy=0;
    this.onGround=false;this.facing=pIdx===0?1:-1;
    this.hp=3;this.fireCD=0;this.state='alive';this.walkT=0;
    this.airJumps=0;this.ducking=false;
    this.shootHoldT=0;this.prevShoot=false;
    this.grenadeCount=MAX_GRENADES;
    this.prevOnGround=false;
    // Ragdoll springs
    this.sLean  =new Spring(0,7,2.8);
    this.sHeadX =new Spring(0,9,3.5);
    this.sHeadY =new Spring(0,9,3.2);
    this.sArmF  =new Spring(0.3,5,2);
    this.sArmB  =new Spring(-0.3,5,2);
    this.sLegF  =new Spring(0.3,6,2.5);
    this.sLegB  =new Spring(-0.3,6,2.5);
    this.sSqX   =new Spring(1,14,4);
    this.sSqY   =new Spring(1,14,4);
  }
  get curH(){return this.ducking?CHAR_H*0.52:CHAR_H;}
  get lft(){return this.x-CHAR_W/2;}
  get rgt(){return this.x+CHAR_W/2;}
  get top(){return this.y-this.curH;}
  get bot(){return this.y;}

  fireLaser(){
    if(this.fireCD>0||this.state!=='alive') return;
    this.fireCD=FIRE_CD;
    const bx=this.x+this.facing*16,by=this.y-this.curH*0.55;
    bullets.push(new Bullet(bx,by,this.facing*BULLET_SPD,-18,this.pIdx,this.color));
    spawnMuzzle(bx,by,this.color);SFX.laser();
    screenShake=Math.max(screenShake,1.5);
  }
  throwGrenade(){
    if(this.fireCD>0) return;
    this.fireCD=1.0;
    const bx=this.x+this.facing*18,by=this.y-this.curH*0.5;
    grenades.push(new Grenade(bx,by,this.facing*420,-420,this.pIdx,this.color));
    SFX.throw();screenShake=Math.max(screenShake,2);
  }

  update(dt){
    if(this.state==='dead'){
      // Ragdoll physics
      this.rdVy+=GRAVITY*dt*0.55;this.rdX+=this.rdVx*dt;this.rdY+=this.rdVy*dt;
      this.rdVx*=Math.pow(0.85,dt*10);
      this.rdAngVel*=Math.pow(0.7,dt*10);this.rdAngle+=this.rdAngVel*dt;
      this.rdArmFVel+=6*dt;this.rdArmF+=this.rdArmFVel*dt;this.rdArmFVel*=Math.pow(0.88,dt*10);
      this.rdArmBVel+=6*dt;this.rdArmB+=this.rdArmBVel*dt;this.rdArmBVel*=Math.pow(0.88,dt*10);
      this.rdLegFVel+=9*dt;this.rdLegF+=this.rdLegFVel*dt;this.rdLegFVel*=Math.pow(0.85,dt*10);
      this.rdLegBVel+=9*dt;this.rdLegB+=this.rdLegBVel*dt;this.rdLegBVel*=Math.pow(0.85,dt*10);
      this.rdAlpha=Math.max(0,this.rdAlpha-dt*0.38);
      return;
    }
    if(this.fireCD>0) this.fireCD-=dt;
    const l=inp(this.pIdx,'left'),r=inp(this.pIdx,'right');
    const j=jumpTrig[this.pIdx];if(j) jumpTrig[this.pIdx]=false;
    const s=inp(this.pIdx,'shoot');
    const duckKey=inp(this.pIdx,'duck');
    this.ducking=duckKey&&this.onGround;

    if(!this.ducking){
      if(l){this.vx=-MOVE_SPD;this.facing=-1;}
      else if(r){this.vx=MOVE_SPD;this.facing=1;}
      else{this.vx*=0.72;if(Math.abs(this.vx)<4)this.vx=0;}
    } else {this.vx*=0.5;}

    // Unlimited double jump (every jump from air counts)
    if(j&&!this.ducking){
      if(this.onGround){this.airJumps=0;}
      this.vy=JUMP_V;this.onGround=false;
      SFX.jump();
      this.sSqX.kick(-2);this.sSqY.kick(2.5);
      spawnDust(this.x,this.y,false);
    }

    // Shoot/grenade
    if(s){
      this.shootHoldT+=dt;
      if(this.shootHoldT<0.42&&this.fireCD<=0) this.fireLaser();
      // Charge sound while holding past fire threshold
      if(this.shootHoldT>=0.42&&this.shootHoldT<0.85){
        const t=Math.min(1,(this.shootHoldT-0.42)/0.43);
        if(Math.random()<0.25) SFX.charge(t);
      }
    } else {
      if(this.prevShoot&&this.shootHoldT>=0.42&&this.fireCD<=0) this.throwGrenade();
      this.shootHoldT=0;
    }
    this.prevShoot=s;

    this.vy+=GRAVITY*dt;
    this.x+=this.vx*dt;this.y+=this.vy*dt;
    if(Math.abs(this.vx)>15&&this.onGround) this.walkT+=dt*6.5;

    const wasGround=this.onGround;this.onGround=false;
    const CH=this.curH;
    for(const c of chunks){
      if(c.state==='gone') continue;
      // Collide against each alive cell individually
      for(const cell of c.aliveCells){
        const clft=cell.wx1, crgt=cell.wx1+cell.ww;
        const ctop=cell.wy1, cbot=cell.wy1+cell.wh;
        if(this.rgt>clft&&this.lft<crgt&&this.bot>ctop&&(this.y-CH)<cbot){
          const oT=this.bot-ctop,oB=cbot-(this.y-CH),oL=this.rgt-clft,oR=crgt-this.lft;
          const mn=Math.min(oT,oB,oL,oR);
          if(mn===oT&&this.vy>=0){this.y=ctop;this.vy=0;this.onGround=true;this.airJumps=0;}
          else if(mn===oB&&this.vy<0){this.y=cbot+CH;this.vy=0;}
          else if(mn===oL){this.x=clft-CHAR_W/2;this.vx=0;}
          else if(mn===oR){this.x=crgt+CHAR_W/2;this.vx=0;}
        }
      }
    }
    if(!wasGround&&this.onGround){SFX.land();this.sSqX.kick(2.5);this.sSqY.kick(-2.5);spawnDust(this.x,this.y,true);}

    // Fragment scatter
    for(const f of fragments){
      if(f.settled&&this.rgt>f.lft&&this.lft<f.rgt&&this.bot+2>f.top&&this.top<f.bot){
        f.vel.x+=Math.sign(this.x-f.x+0.01)*-70+this.vx*0.2;
        f.vel.y=-60-Math.random()*80;f.settled=false;f.bounces=0;f.angV=(Math.random()-.5)*12;
      }
    }

    if(this.x<CHAR_W/2){this.x=CHAR_W/2;this.vx=0;}
    if(this.x>W-CHAR_W/2){this.x=W-CHAR_W/2;this.vx=0;}
    if(this.y>H+150) this.die();

    // Fire zone
    if(fireActive){
      const fc=chunks.find(c=>c.id==='flame'&&c.state!=='gone');
      if(fc){
        const fcx=fc.wx+fc.ww/2,fcy=fc.wy+fc.wh/2;
        const fcr=Math.min(fc.ww,fc.wh)*0.38;
        const dx=this.x-fcx,dy=(this.y-CHAR_H/2)-fcy;
        if(Math.sqrt(dx*dx+dy*dy)<fcr+CHAR_W*0.6) this.die();
      }
    }

    // Ragdoll springs
    const ws=Math.abs(this.vx)/MOVE_SPD,ph=this.walkT;
    const moving=this.onGround&&ws>0.1;
    this.sLean.update(dt,this.vx*0.001+this.vy*0.00015);
    this.sHeadX.update(dt,-this.vx*0.007);
    this.sHeadY.update(dt,this.vy>0?Math.min(this.vy*0.007,2):0);
    this.sArmF.update(dt,moving?Math.sin(ph)*0.85*ws:(this.onGround?0.35:1.1));
    this.sArmB.update(dt,moving?-Math.sin(ph)*0.85*ws:(this.onGround?-0.35:-0.8));
    this.sLegF.update(dt,moving?Math.sin(ph)*0.7*ws:(this.onGround?(this.ducking?0.7:0.28):-0.5));
    this.sLegB.update(dt,moving?-Math.sin(ph)*0.7*ws:(this.onGround?(this.ducking?-0.7:-0.28):-0.4));
    this.sSqX.update(dt,1);this.sSqY.update(dt,1);
  }

  takeHit(ix,iy){
    this.hp--;SFX.hit();
    this.vx+=ix*0.22;this.vy+=iy*0.18-60;
    screenShake=Math.max(screenShake,5);
    const kick=10;
    this.sHeadX.kick(ix*0.5);this.sHeadY.kick(-Math.abs(iy)*0.3-5);
    this.sArmF.kick((Math.random()-.5)*kick*3);this.sArmB.kick((Math.random()-.5)*kick*3);
    this.sLegF.kick((Math.random()-.5)*kick*2);this.sLegB.kick((Math.random()-.5)*kick*2);
    this.sLean.kick((Math.random()-.5)*4);
    if(this.hp<=0) this.die();
  }

  die(){
    if(this.state==='dead') return;
    this.state='dead';
    // Ragdoll initial state
    this.rdX=this.x;this.rdY=this.y;
    this.rdVx=this.vx+(Math.random()-.5)*60;
    this.rdVy=Math.min(this.vy,-40)-60-Math.random()*60;
    this.rdAngle=this.sLean.v;
    this.rdAngVel=(Math.random()-.5)*10;
    this.rdAlpha=1;
    this.rdArmF=this.sArmF.v;this.rdArmFVel=(Math.random()-.5)*7;
    this.rdArmB=this.sArmB.v;this.rdArmBVel=(Math.random()-.5)*7;
    this.rdLegF=this.sLegF.v;this.rdLegFVel=(Math.random()-.5)*5+2;
    this.rdLegB=this.sLegB.v;this.rdLegBVel=(Math.random()-.5)*5-2;
    spawnBigExplosion(this.x,this.y-CHAR_H/2,this.color);
    SFX.explode();
    if(gameMode===2){const w=this.pIdx===0?1:0;scores[w]++;roundWinner=w;SFX.win();}
    else{roundWinner=-1;}
    gameState='roundEnd';roundEndTimer=2.5;
  }

  draw(){
    if(this.state==='dead'){
      if(!this.rdAlpha||this.rdAlpha<=0) return;
      ctx.save();ctx.globalAlpha=this.rdAlpha;
      ctx.translate(this.rdX,this.rdY);ctx.rotate(this.rdAngle);
      const f=this.facing,HR=9,CH=CHAR_H;
      const bTop=-CH,headCY=bTop+HR,headCX=0;
      const shlY=headCY+HR+3,hipY=shlY+20;
      ctx.shadowBlur=14;ctx.shadowColor=this.glow;
      const drawLimb=(x1,y1,x2,y2)=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();};
      ctx.strokeStyle=this.color;ctx.lineWidth=3.5;ctx.lineCap='round';
      const LL=17;
      const lbx=f*Math.sin(-this.rdLegB)*LL,lby=hipY+Math.cos(this.rdLegB)*LL;
      const lfx=f*Math.sin(this.rdLegF)*LL, lfy=hipY+Math.cos(this.rdLegF)*LL;
      ctx.globalAlpha=this.rdAlpha*0.65;drawLimb(0,hipY,lbx,lby);
      ctx.globalAlpha=this.rdAlpha;     drawLimb(0,hipY,lfx,lfy);
      ctx.lineWidth=4;drawLimb(0,shlY,0,hipY);
      const AL=13;
      const abx=f*Math.cos(this.rdArmB)*AL-f*2,aby=shlY+6+Math.abs(Math.sin(this.rdArmB))*5;
      const afx=f*Math.cos(this.rdArmF)*AL+f*3,afy=shlY+5+Math.abs(Math.sin(this.rdArmF))*5;
      ctx.lineWidth=3;
      ctx.globalAlpha=this.rdAlpha*0.65;drawLimb(0,shlY+3,abx,aby);
      ctx.globalAlpha=this.rdAlpha;     drawLimb(0,shlY+3,afx,afy);
      ctx.shadowBlur=14;ctx.shadowColor=this.glow;
      ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(headCX,headCY,HR,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.fillStyle='#0a0a14';
      ctx.beginPath();ctx.arc(headCX+f*4,headCY-1,2.5,0,Math.PI*2);ctx.fill();
      ctx.restore();
      return;
    }
    ctx.save();
    ctx.translate(this.x,this.y);ctx.rotate(this.sLean.v);ctx.scale(this.sSqX.v,this.sSqY.v);
    const f=this.facing,HR=9;
    const CH=this.ducking?CHAR_H*0.52:CHAR_H;
    const bTop=-CH,headCY=bTop+HR+this.sHeadY.v,headCX=this.sHeadX.v;
    const shlY=headCY+HR+3,hipY=this.ducking?shlY+12:shlY+20;
    ctx.shadowBlur=18;ctx.shadowColor=this.glow;
    const drawLimb=(x1,y1,x2,y2)=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();};
    ctx.strokeStyle=this.color;ctx.lineWidth=3.5;ctx.lineCap='round';
    const LL=this.ducking?12:17,duckA=this.ducking?1.1:0;
    const lbx=f*Math.sin(-this.sLegB.v+duckA)*LL,lby=hipY+Math.cos(this.sLegB.v-duckA)*LL;
    const lfx=f*Math.sin(this.sLegF.v+duckA)*LL, lfy=hipY+Math.cos(this.sLegF.v+duckA)*LL;
    ctx.globalAlpha=0.65;drawLimb(0,hipY,lbx,lby);
    ctx.globalAlpha=1;  drawLimb(0,hipY,lfx,lfy);
    ctx.lineWidth=4;drawLimb(0,shlY,0,hipY);
    const AL=13;
    const abx=f*Math.cos(this.sArmB.v)*AL-f*2,aby=shlY+6+Math.abs(Math.sin(this.sArmB.v))*5;
    const afx=f*Math.cos(this.sArmF.v)*AL+f*3,afy=shlY+5+Math.abs(Math.sin(this.sArmF.v))*5;
    ctx.lineWidth=3;
    ctx.globalAlpha=0.65;drawLimb(0,shlY+3,abx,aby);
    ctx.globalAlpha=1;  drawLimb(0,shlY+3,afx,afy);
    drawLaserGun(ctx,afx,afy,f,this.color,this.fireCD<FIRE_CD*0.85);
    if(this.shootHoldT>0.25){
      const charge=Math.min(1,(this.shootHoldT-0.25)/0.17);
      ctx.shadowBlur=8+charge*12;ctx.shadowColor=this.color;
      ctx.strokeStyle=this.color;ctx.lineWidth=2;ctx.globalAlpha=charge*0.8;
      ctx.beginPath();ctx.arc(afx,afy,6+charge*4,0,Math.PI*2*charge);ctx.stroke();
      ctx.globalAlpha=1;
    }
    ctx.shadowBlur=14;ctx.shadowColor=this.glow;ctx.lineWidth=0;
    ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(headCX,headCY,HR,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='#0a0a14';
    ctx.beginPath();ctx.arc(headCX+f*4,headCY-1,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(headCX+f*4.5,headCY-1.5,1,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
}

function drawLaserGun(ctx,x,y,f,col,firing){
  ctx.save();ctx.translate(x,y);ctx.scale(f,1);
  ctx.shadowBlur=firing?14:6;ctx.shadowColor=col;
  ctx.fillStyle='#1e2d3d';ctx.beginPath();
  ctx.moveTo(0,-3.5);ctx.lineTo(13,-3.5);ctx.lineTo(15,-1.5);ctx.lineTo(15,3);ctx.lineTo(0,3);ctx.closePath();ctx.fill();
  ctx.fillStyle='#2a3d50';ctx.fillRect(13,-2,10,4);
  ctx.shadowBlur=10;ctx.shadowColor=col;ctx.fillStyle=col;ctx.fillRect(2,-2.5,5,2.5);
  ctx.shadowBlur=firing?20:8;ctx.shadowColor='#aaf0ff';
  ctx.fillStyle=firing?'#ffffff':'#88ddff';ctx.fillRect(22,-1.5,3,3);
  ctx.restore();
}

// ══════════════════════════════════════════════════════════
// BULLET
// ══════════════════════════════════════════════════════════
class Bullet{
  constructor(x,y,vx,vy,owner,col){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.owner=owner;this.col=col;this.alive=true;
    this.trail=[];this.bounces=0;
  }
  update(dt){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>8) this.trail.shift();
    this.vy+=180*dt;this.x+=this.vx*dt;this.y+=this.vy*dt;
    // Wall bounce — laser bounces, can hit owner
    if(this.x<2){this.x=2;this.vx=Math.abs(this.vx);this.bounces++;this.owner=-1;spawnImpact(this.x,this.y,this.col);}
    if(this.x>W-2){this.x=W-2;this.vx=-Math.abs(this.vx);this.bounces++;this.owner=-1;spawnImpact(this.x,this.y,this.col);}
    if(this.y>H+80||this.y<-200||this.bounces>4){this.alive=false;return;}
    for(const c of chunks){
      if(c.state==='gone') continue;
      for(const cell of c.aliveCells){
        if(this.x>cell.wx1&&this.x<cell.wx1+cell.ww&&this.y>cell.wy1&&this.y<cell.wy1+cell.wh){
          c.hit(this.vx*0.3,this.vy*0.3,this.x,this.y);
          spawnImpact(this.x,this.y,this.col);this.alive=false;return;
        }
      }
    }
    // After bounce, owner=-1 so hits everyone including self
    for(const ch of characters){
      if(ch.state==='dead') continue;
      if(ch.pIdx===this.owner) continue;// skip only if same player (owner -1 = hits all)
      if(this.x>ch.lft&&this.x<ch.rgt&&this.y>ch.top&&this.y<ch.bot){
        ch.takeHit(this.vx,this.vy);
        spawnImpact(this.x,this.y,this.col);this.alive=false;return;
      }
    }
  }
  draw(){
    const ang=Math.atan2(this.vy,this.vx);
    ctx.save();
    if(this.trail.length>2){
      for(let i=1;i<this.trail.length;i++){
        const a=(i/this.trail.length)*0.5;
        ctx.strokeStyle=this.col;ctx.globalAlpha=a*0.55;
        ctx.lineWidth=3*(i/this.trail.length);ctx.shadowBlur=12;ctx.shadowColor=this.col;
        ctx.beginPath();ctx.moveTo(this.trail[i-1].x,this.trail[i-1].y);
        ctx.lineTo(this.trail[i].x,this.trail[i].y);ctx.stroke();
      }
    }
    ctx.globalAlpha=1;ctx.translate(this.x,this.y);ctx.rotate(ang);
    ctx.shadowBlur=24;ctx.shadowColor=this.col;
    const bl=24;
    const g=ctx.createLinearGradient(-bl,0,6,0);
    g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(0.6,this.col+'99');g.addColorStop(1,'#fff');
    ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(0,0,bl,2.5,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=10;ctx.shadowColor='#ffffff';ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(2,0,3.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

// ══════════════════════════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════════════════════════
class Particle{
  constructor(x,y,vx,vy,col,sz,life,glow){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.col=col;this.sz=sz;this.life=life;this.maxL=life;this.glow=glow||col;
  }
  update(dt){this.vy+=500*dt;this.x+=this.vx*dt;this.y+=this.vy*dt;this.vx*=0.94;this.life-=dt;}
  draw(){
    const a=Math.max(0,this.life/this.maxL);
    ctx.globalAlpha=a;ctx.shadowBlur=10;ctx.shadowColor=this.glow;ctx.fillStyle=this.col;
    ctx.beginPath();ctx.arc(this.x,this.y,this.sz*a,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
}

// Ripple shockwave ring
class Ripple{
  constructor(x,y,col,startR){
    this.x=x;this.y=y;this.col=col;this.r=startR||0;this.life=0.6;this.maxL=0.6;
  }
  update(dt){this.r+=380*dt;this.life-=dt;}
  draw(){
    const a=Math.max(0,this.life/this.maxL);
    ctx.save();ctx.globalAlpha=a*0.7;ctx.shadowBlur=14;ctx.shadowColor=this.col;
    ctx.strokeStyle=this.col;ctx.lineWidth=2.5*(a);
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
}
let ripples=[];
function spawnRipple(x,y,col,startR){ripples.push(new Ripple(x,y,col,startR||0));}

function spawnImpact(x,y,col){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2,s=60+Math.random()*260;

// ══════════════════════════════════════════════════════════
// FRAGMENTS
// ══════════════════════════════════════════════════════════
class Fragment{
  constructor(x,y,vx,vy,col,sz,delay=0,shape='rect'){
    this.x=x;this.y=y;this.vel={x:vx,y:vy};this.col=col;this.sz=sz;
    this.angle=Math.random()*Math.PI*2;this.angV=(Math.random()-.5)*14;
    this.alpha=1;this.life=14+Math.random()*10;this.settled=false;this.bounces=0;
    this.delay=delay;this.shape=shape;
    // For triangles: random elongation
    this.w2=shape==='tri'?(0.4+Math.random()*0.6)*sz*2:sz*2;
    this.h2=shape==='tri'?(0.3+Math.random()*0.5)*sz*2:sz*2;
  }
  update(dt){
    if(this.delay>0){this.delay-=dt;return;}
    if(this.angV){this.angle+=this.angV*dt;this.angV*=0.87;}
    if(!this.settled)this.vel.y+=GRAVITY*dt;
    else{this.vel.x*=0.78;if(Math.abs(this.vel.x)<2)this.vel.x=0;}
    this.x+=this.vel.x*dt;this.y+=this.vel.y*dt;
    this.life-=dt;if(this.life<3)this.alpha=this.life/3;
    for(const c of chunks){
      if(c.state==='gone') continue;
      for(const cell of c.aliveCells){
        if(this.x>cell.wx1&&this.x<cell.wx1+cell.ww&&this.y+this.sz>cell.wy1&&this.y-this.sz<cell.wy1+cell.wh){
          if(this.vel.y>0&&this.y<cell.wy1+this.sz+8){
            this.y=cell.wy1-this.sz;this.vel.y=-Math.abs(this.vel.y)*0.28;
            this.vel.x*=0.65;this.bounces++;
            if(Math.abs(this.vel.y)<20||this.bounces>3){this.vel.y=0;this.settled=true;}
          }
        }
      }
    }
    if(this.y+this.sz>H){this.y=H-this.sz;this.vel.y=-Math.abs(this.vel.y)*0.25;
      this.vel.x*=0.6;this.bounces++;
      if(Math.abs(this.vel.y)<20||this.bounces>3){this.vel.y=0;this.settled=true;}}
    if(this.x<this.sz){this.x=this.sz;this.vel.x=Math.abs(this.vel.x)*0.4;}
    if(this.x>W-this.sz){this.x=W-this.sz;this.vel.x=-Math.abs(this.vel.x)*0.4;}
  }
  draw(){
    if(this.delay>0||this.alpha<=0) return;
    ctx.save();ctx.globalAlpha=this.alpha;ctx.translate(this.x,this.y);ctx.rotate(this.angle);
    ctx.fillStyle=this.col;
    if(this.shape==='tri'){
      // Irregular shard — triangle with random elongation
      const w=this.w2/2, h=this.h2/2;
      ctx.beginPath();
      ctx.moveTo(-w, h);
      ctx.lineTo(w*0.3, -h);
      ctx.lineTo(w, h*0.4);
      ctx.closePath();ctx.fill();
    } else {
      ctx.fillRect(-this.sz,-this.sz,this.sz*2,this.sz*2);
    }
    ctx.restore();
  }
  get lft(){return this.x-this.sz;}get rgt(){return this.x+this.sz;}
  get top(){return this.y-this.sz;}get bot(){return this.y+this.sz;}
}

function spawnFrags(chunk,ix,iy,n){
  const fcols=chunk.isFlame?['#eb5f40','#e41f13','#ff7744','#cc2200','#ff9966']:['#ffffff','#dddddd','#bbbbbb','#cccccc'];
  for(let i=0;i<n;i++){
    const fx=chunk.wx+Math.random()*chunk.ww,fy=chunk.wy+Math.random()*chunk.wh;
    const spd=55+Math.random()*360,ang=-Math.PI/2+(Math.random()-.5)*Math.PI*1.7;
    const sz=0.8+Math.random()*2.2;
    fragments.push(new Fragment(fx,fy,Math.cos(ang)*spd+(ix||0)*0.12,Math.sin(ang)*spd-15+(iy||0)*0.12,
      fcols[Math.floor(Math.random()*fcols.length)],sz));
  }
}

function spawnLargeShards(chunk,ix,iy){
  // Large staggered slabs that break away from the chunk over ~0.5s
  const fcols=chunk.isFlame
    ?['#eb5f40','#e41f13','#ff7744','#cc2200','#ff9966','#ff5522']
    :['#ffffff','#e8e8e8','#d0d0d0','#cccccc'];
  const n=chunk.isFlame?20:14;
  for(let i=0;i<n;i++){
    const fx=chunk.wx+(0.05+Math.random()*0.9)*chunk.ww;
    const fy=chunk.wy+(0.1+Math.random()*0.8)*chunk.wh;
    const ang=-Math.PI*0.5+(Math.random()-.5)*Math.PI*1.5;
    const spd=35+Math.random()*140;
    const sz=8+Math.random()*13;          // 8-21px — substantial slabs
    const delay=Math.random()*0.55;       // stagger 0–0.55s
    fragments.push(new Fragment(
      fx,fy,
      Math.cos(ang)*spd+(ix||0)*0.06,
      Math.sin(ang)*spd-8+(iy||0)*0.06,
      fcols[Math.floor(Math.random()*fcols.length)],sz,delay
    ));
  }
}

function inp(p,a){
  if(p===0){
    if(a==='left')  return keys['a']||keys['A']||touch['p0-left'];
    if(a==='right') return keys['d']||keys['D']||touch['p0-right'];
    if(a==='shoot') return keys[' ']||touch['p0-shoot'];
    if(a==='duck')  return keys['s']||keys['S'];
  } else {
    if(a==='left')  return keys['ArrowLeft'] ||keys['j']||keys['J']||touch['p1-left'];
    if(a==='right') return keys['ArrowRight']||keys['l']||keys['L']||touch['p1-right'];
    if(a==='shoot') return keys['Alt']||keys['/']||keys[';']||touch['p1-shoot'];
    if(a==='duck')  return keys['ArrowDown'];
  }
  return false;
}
document.addEventListener('keydown',e=>{
  const was=keys[e.key];keys[e.key]=true;
  if(!was){
    if(e.key==='w'||e.key==='W') jumpTrig[0]=true;
    if(e.key==='ArrowUp'||e.key==='i'||e.key==='I') jumpTrig[1]=true;
    // H to toggle instructions on start screen
    if((e.key==='h'||e.key==='H')&&gameState==='start'){
      _showInstructions=!_showInstructions;
    }
    if(e.key==='Escape'&&_showInstructions) _showInstructions=false;
  }
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
const _mcEl=document.getElementById('mc');
const _hasTouchInput='ontouchstart' in window||navigator.maxTouchPoints>0;
function setMC(){
  if(!_hasTouchInput) return;
  const active=gameState==='playing'||gameState==='roundEnd';
  _mcEl.style.display=active?'flex':'none';
  // Single D-pad on phone screens or 1P mode
  if(W<560||gameMode===1) _mcEl.classList.add('solo');
  else _mcEl.classList.remove('solo');
}
(()=>{
  if(!_hasTouchInput) return;
  const getAct=el=>{let e=el;while(e&&e!==_mcEl){if(e.dataset&&e.dataset.p!=null&&e.dataset.a)return `p${e.dataset.p}-${e.dataset.a}`;e=e.parentElement;}return null;};
  _mcEl.addEventListener('touchstart',e=>{
    for(const t of e.changedTouches){
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const act=getAct(el);
      if(act){touch[act]=true;if(act==='p0-jump')jumpTrig[0]=true;if(act==='p1-jump')jumpTrig[1]=true;el.classList.add('on');}
    }
    e.preventDefault();
  },{passive:false});
  _mcEl.addEventListener('touchend',e=>{
    for(const t of e.changedTouches){
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const act=getAct(el);if(act){touch[act]=false;el&&el.classList.remove('on');}
    }
    e.preventDefault();
  },{passive:false});
})();

// ══════════════════════════════════════════════════════════
// DRAW HELPERS
// ══════════════════════════════════════════════════════════
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
// Hex color → [r,g,b] integers
function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

/// Backdrop blur: copies current frame to offscreen canvas, draws back blurred
let _blurCanvas=null;
function backdropBlur(x,y,w,h,r,amt){
  amt=amt||14;r=r||0;
  if(!_blurCanvas){_blurCanvas=document.createElement('canvas');_blurCanvas.width=canvas.width;_blurCanvas.height=canvas.height;}
  const bc=_blurCanvas.getContext('2d');
  bc.clearRect(0,0,_blurCanvas.width,_blurCanvas.height);
  bc.drawImage(canvas,0,0);// snapshot current pixels
  ctx.save();
  ctx.beginPath();
  if(r>0){rr(x,y,w,h,r);}else{ctx.rect(x,y,w,h);}
  ctx.clip();
  ctx.filter=`blur(${amt}px)`;
  ctx.drawImage(_blurCanvas,0,0,_blurCanvas.width,_blurCanvas.height,0,0,W,H);
  ctx.filter='none';
  ctx.restore();
}

// Glass morphism panel (no tint)
function glassPanel(x,y,w,h,r=18){
  ctx.shadowBlur=32;ctx.shadowColor='rgba(0,0,0,0.55)';
  ctx.fillStyle='rgba(0,0,0,0.01)';rr(x,y+4,w,h,r);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.07)';rr(x,y,w,h,r);ctx.fill();
  const hi=ctx.createLinearGradient(x,y,x,y+h*0.45);
  hi.addColorStop(0,'rgba(255,255,255,0.14)');hi.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hi;rr(x,y,w,h*0.45,r);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;rr(x,y,w,h,r);ctx.stroke();
}

function drawBtn(x,y,w,h,label,col,textCol,fs){
  const R=14;
  // Drop shadow
  ctx.shadowBlur=24;ctx.shadowColor='rgba(0,0,0,0.5)';
  ctx.fillStyle='rgba(0,0,0,0.01)';rr(x+1,y+3,w-2,h,R);ctx.fill();ctx.shadowBlur=0;
  // Glass base
  ctx.fillStyle='rgba(255,255,255,0.07)';rr(x,y,w,h,R);ctx.fill();
  // Accent tint
  if(col&&col[0]==='#'){const[cr,cg,cb]=hexRgb(col);ctx.fillStyle=`rgba(${cr},${cg},${cb},0.20)`;rr(x,y,w,h,R);ctx.fill();}
  // Top shine
  const hi=ctx.createLinearGradient(x,y,x,y+h);
  hi.addColorStop(0,'rgba(255,255,255,0.20)');hi.addColorStop(0.4,'rgba(255,255,255,0.05)');hi.addColorStop(1,'rgba(0,0,0,0.06)');
  ctx.fillStyle=hi;rr(x,y,w,h,R);ctx.fill();
  // Border + optional glow
  if(col&&col[0]==='#'){
    const[cr,cg,cb]=hexRgb(col);
    ctx.shadowBlur=16;ctx.shadowColor=`rgba(${cr},${cg},${cb},0.6)`;
    ctx.strokeStyle=`rgba(${cr},${cg},${cb},0.50)`;
  } else {ctx.strokeStyle='rgba(255,255,255,0.20)';}
  ctx.lineWidth=1.5;rr(x,y,w,h,R);ctx.stroke();ctx.shadowBlur=0;
  // Label
  if(col&&col[0]==='#'){const[cr,cg,cb]=hexRgb(col);ctx.shadowBlur=8;ctx.shadowColor=`rgba(${cr},${cg},${cb},0.8)`;}
  const _fs=fs||17;
  ctx.fillStyle=textCol||'#fff';ctx.font=`600 ${_fs}px Poppins,Arial,sans-serif`;ctx.textAlign='center';
  ctx.fillText(label,x+w/2,y+h/2+_fs*0.36);ctx.shadowBlur=0;
}

function drawBG(){
  const th=BG_THEMES[bgThemeIdx%BG_THEMES.length];
  const g=ctx.createRadialGradient(W/2,H*0.35,0,W/2,H*0.5,Math.max(W,H)*0.76);
  g.addColorStop(0,th.c0);g.addColorStop(1,th.c1);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Background decoration by style
  ctx.strokeStyle=th.grid;ctx.lineWidth=1;
  if(th.style==='grid'||th.style==='hexgrid'){
    const GS=th.style==='hexgrid'?48:55;
    for(let x=0;x<W;x+=GS){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=GS){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    if(th.style==='hexgrid'){
      // Extra diagonal offset lines for hex feel
      for(let x=-GS;x<W+GS;x+=GS*2){
        ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+GS,H);ctx.stroke();
      }
    }
  } else if(th.style==='scanline'){
    for(let y=0;y<H;y+=3){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  } else if(th.style==='diagonal'){
    const DS=70;
    for(let x=-H;x<W+H;x+=DS){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+H,H);ctx.stroke();}
  }

  // Atmo particles
  for(const p of atmoParticles){p.update(_currentDt);p.draw(th.atmo);}

  // Floor shadow
  const fl=ctx.createLinearGradient(0,H*0.78,0,H);
  fl.addColorStop(0,'rgba(0,0,0,0)');fl.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=fl;ctx.fillRect(0,H*0.78,W,H*0.22);
}

// FIRE PARTICLES — emits from actual flame shape with wind dynamics
// ══════════════════════════════════════════════════════════
let _windT=0,_windX=0;
function spawnFireParticles(fc){
  // Hard cap: don't spawn if too many particles exist (perf guard)
  if(particles.length>320) return;

  _windT+=_currentDt;
  _windX=Math.sin(_windT*0.4)*22+Math.sin(_windT*0.9)*14+Math.sin(_windT*2.1)*7;

  const cx=fc.wx+fc.ww*0.5;
  const cy=fc.wy+fc.wh*0.5;
  // Emit from the entire red diamond shape — sample points along all 4 arms
  const n=fireActive?14:6;

  for(let i=0;i<n;i++){
    // Sample across the full flame bbox — the 4 arms of the diamond
    let px,py;
    const zone=Math.random();
    if(zone<0.25){
      // Top-left arm
      const t=Math.random();
      px=fc.wx+fc.ww*(0.05+t*0.42);
      py=fc.wy+fc.wh*(0.04+t*0.48);
    } else if(zone<0.5){
      // Top-right arm
      const t=Math.random();
      px=fc.wx+fc.ww*(0.95-t*0.42);
      py=fc.wy+fc.wh*(0.04+t*0.48);
    } else if(zone<0.75){
      // Bottom-left arm
      const t=Math.random();
      px=fc.wx+fc.ww*(0.08+t*0.38);
      py=fc.wy+fc.wh*(0.55+t*0.4);
    } else {
      // Bottom-right arm
      const t=Math.random();
      px=fc.wx+fc.ww*(0.92-t*0.38);
      py=fc.wy+fc.wh*(0.55+t*0.4);
    }

    const layer=Math.random();
    let col,sz,life,baseVy;
    if(layer<0.25){
      col=`hsl(${5+Math.random()*12},100%,${42+Math.random()*18}%)`;
      sz=1.2+Math.random()*2; life=0.3+Math.random()*0.25; baseVy=-80-Math.random()*90;
    } else if(layer<0.6){
      col=`hsl(${22+Math.random()*22},100%,${56+Math.random()*18}%)`;
      sz=0.8+Math.random()*1.6; life=0.32+Math.random()*0.28; baseVy=-130-Math.random()*120;
    } else if(zone<0.85){
      col=`hsl(${40+Math.random()*18},100%,${68+Math.random()*20}%)`;
      sz=0.5+Math.random()*1.1; life=0.22+Math.random()*0.25; baseVy=-190-Math.random()*120;
    } else {
      col=`hsl(${52+Math.random()*14},100%,${80+Math.random()*18}%)`;
      sz=0.3+Math.random()*0.7; life=0.12+Math.random()*0.15; baseVy=-240-Math.random()*90;
    }

    const windScale=0.3+Math.random()*0.6;
    const vx=(Math.random()-0.5)*25+_windX*windScale;
    particles.push(new Particle(px,py,vx,baseVy,col,sz,life,col));
  }

  // Occasional ember spark
  if(Math.random()<(fireActive?0.35:0.08)){
    const arm=Math.floor(Math.random()*4);
    const spx=arm<2?fc.wx+fc.ww*(arm===0?0.15:0.85):fc.wx+fc.ww*(arm===2?0.15:0.85);
    const spy=arm<2?fc.wy+fc.wh*0.1:fc.wy+fc.wh*0.75;
    particles.push(new Particle(
      spx,spy,
      (Math.random()-0.5)*70+_windX*(0.8+Math.random()*0.5),
      -200-Math.random()*150,
      `hsl(${38+Math.random()*20},100%,${75+Math.random()*20}%)`,
      0.4+Math.random()*0.7, 0.35+Math.random()*0.25,'#ffcc00'
    ));
  }
}

// START SCREEN

let _sBtns=null;
function drawStart(){
  drawBG();
  const mob=W<560;
  // ── Huge background logo — fills full screen height, left-half off-screen ──
  const bgLs=H/SVG_H;                        // scale so flame exactly fills screen height

  // Flame SVG center ≈ x=82.86; shift right so center sits at ~20% of screen width
  const bgLx=W*0.20-(82.86-55)*bgLs;
  ctx.save();

  ctx.translate(bgLx,bgLy);ctx.scale(bgLs,bgLs);ctx.translate(-55,-1);
  const bgFp=new Path2D(SVG_PATHS.flame);

// CHAR SELECT — prevent duplicate selection in 2P
// ══════════════════════════════════════════════════════════
let _cards=[],_cont=null;
function drawCharSelect(){
  drawBG();
  const mob=W<560;
  ctx.save();ctx.textAlign='center';
  const titleSz=Math.min(32,W*0.072);
  ctx.shadowBlur=20;ctx.shadowColor='#eb5f40';ctx.font=`bold ${titleSz}px Poppins,Arial,sans-serif`;ctx.fillStyle='#fff';
  const title=gameMode===1?'Choose Your Fighter':charStep===0?'Player 1 — Choose Fighter':'Player 2 — Choose Fighter';
  ctx.fillText(title,W/2,H*0.11);ctx.shadowBlur=0;ctx.restore();
  // Scale cards to fit screen width
  const gap=mob?10:22;
  const maxTotalW=W*0.92;
  const cW=Math.min(170,Math.floor((maxTotalW-(CHARS_DEF.length-1)*gap)/CHARS_DEF.length));
  const cH=Math.round(cW/170*230);
  const imgH=Math.round(cW/170*152);
  const total=CHARS_DEF.length*(cW+gap)-gap;
  const sx=W/2-total/2;
  // Center cards between title and continue button, never overlapping title
  const mobileCtrlClear=_hasTouchInput?230:0;
  const availH=H-mobileCtrlClear;
  const contH2=52,cy2calc=availH-contH2-24;
  const titleBottom=H*0.11+titleSz+18;
  const midY=(titleBottom+cy2calc)/2;
  const cY=Math.max(titleBottom, midY-cH/2);
  _cards=[];
  CHARS_DEF.forEach((ch,i)=>{
    const cx=sx+i*(cW+gap);
    const isSel=(charStep===0&&selChars[0]===i)||(charStep===1&&selChars[1]===i);
    const isLocked=gameMode===2&&charStep===1&&selChars[0]===i;
    ctx.globalAlpha=isLocked?0.28:1;
    // Glass card base
    ctx.shadowBlur=isSel?24:16;ctx.shadowColor=isSel?ch.color:'rgba(0,0,0,0.5)';
    ctx.fillStyle='rgba(0,0,0,0.01)';rr(cx,cY+4,cW,cH,18);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.07)';rr(cx,cY,cW,cH,18);ctx.fill();
    // Top shine
    const chi=ctx.createLinearGradient(cx,cY,cx,cY+cH*0.4);
    chi.addColorStop(0,'rgba(255,255,255,0.13)');chi.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=chi;rr(cx,cY,cW,cH*0.4,18);ctx.fill();
    // Color tint when selected
    if(isSel){const[cr,cg,cb]=hexRgb(ch.color);ctx.fillStyle=`rgba(${cr},${cg},${cb},0.10)`;rr(cx,cY,cW,cH,18);ctx.fill();}
    // Border
    if(isSel){ctx.shadowBlur=20;ctx.shadowColor=ch.color;ctx.strokeStyle=ch.color;ctx.lineWidth=2;}
    else{ctx.strokeStyle='rgba(255,255,255,0.13)';ctx.lineWidth=1;}
    rr(cx,cY,cW,cH,18);ctx.stroke();ctx.shadowBlur=0;
    const img=charImgs[i];
    if(img.complete&&img.naturalWidth>0){
      ctx.save();rr(cx+10,cY+10,cW-20,imgH,8);ctx.clip();
      ctx.drawImage(img,cx+10,cY+10,cW-20,imgH);ctx.restore();
      const vg=ctx.createLinearGradient(0,cY+imgH*0.72,0,cY+imgH+10);
      vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(15,15,22,0.9)');
      ctx.fillStyle=vg;rr(cx+10,cY+10,cW-20,imgH,8);ctx.fill();
    } else {
      ctx.save();ctx.translate(cx+cW/2,cY+cH*0.35);
      ctx.shadowBlur=16;ctx.shadowColor=ch.color;ctx.strokeStyle=ch.color;ctx.lineWidth=3;ctx.lineCap='round';ctx.fillStyle=ch.color;
      ctx.beginPath();ctx.arc(0,-28,13,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.moveTo(0,-15);ctx.lineTo(0,18);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-16,2);ctx.lineTo(16,2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,18);ctx.lineTo(-12,38);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,18);ctx.lineTo(12,38);ctx.stroke();
      ctx.restore();
    }
    const nameSz=Math.min(18,cW*0.13);
    const badgeSz=Math.min(12,cW*0.09);
    // Position text proportionally within the card's below-image space
    const below=cH-imgH;
    const nameY=cY+imgH+Math.round(below*0.52);
    const badgeY=cY+imgH+Math.round(below*0.82);
    ctx.save();ctx.textAlign='center';
    ctx.shadowBlur=12;ctx.shadowColor=ch.color;ctx.font=`bold ${nameSz}px Poppins,Arial,sans-serif`;ctx.fillStyle=ch.color;
    ctx.fillText(ch.name,cx+cW/2,nameY);
    if(isSel){ctx.font=`bold ${badgeSz}px Poppins,Arial,sans-serif`;ctx.fillStyle=ch.color;ctx.fillText('✓ SELECTED',cx+cW/2,badgeY);}
    if(isLocked){ctx.font=`bold ${badgeSz}px Poppins,Arial,sans-serif`;ctx.fillStyle='rgba(255,80,80,0.9)';ctx.fillText('✗ TAKEN',cx+cW/2,badgeY);}
    ctx.restore();ctx.globalAlpha=1;
    _cards.push({x:cx,y:cY,w:cW,h:cH,i,locked:isLocked});
  });
  const contW=Math.min(220,W*0.55),contH=52;
  const cy2=availH-contH-24;
  drawBtn(W/2-contW/2,cy2,contW,contH,'CONTINUE','#eb5f40','#fff');
  _cont={x:W/2-contW/2,y:cy2,w:contW,h:contH};
}

// ══════════════════════════════════════════════════════════
// CLICK HANDLING
// ══════════════════════════════════════════════════════════
function inR(mx,my,r){return mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h;}
canvas.addEventListener('click',e=>{
  SFX.init();Music.start();
  const mx=e.clientX,my=e.clientY;
  if(gameState==='start'&&_sBtns){
    if(_showInstructions){
      if(_instrCloseBtn&&inR(mx,my,_instrCloseBtn)) _showInstructions=false;
      return;
    }
    if(inR(mx,my,_sBtns.p1)){gameMode=1;gameState='charSelect';charStep=0;setMC();}
    else if(inR(mx,my,_sBtns.p2)&&W>=560){gameMode=2;gameState='charSelect';charStep=0;setMC();}
    else if(_sBtns.info&&inR(mx,my,_sBtns.info)){_showInstructions=true;}
    return;
  }
  if(gameState==='charSelect'){
    for(const c of _cards){
      if(inR(mx,my,c)&&!c.locked) selChars[charStep]=c.i;
    }
    if(_cont&&inR(mx,my,_cont)){
      if(gameMode===2&&charStep===0){
        charStep=1;
        // Default P2 to a different character
        if(selChars[1]===selChars[0]) selChars[1]=(selChars[0]+1)%CHARS_DEF.length;
      } else {scores=[0,0];bgThemeIdx=Math.floor(Math.random()*BG_THEMES.length);startGame();}
    }
    return;
  }
  if((gameState==='playing'||gameState==='roundEnd')&&inR(mx,my,_resetBtn)){
    scores=[0,0];bgThemeIdx=Math.floor(Math.random()*BG_THEMES.length);
    bullets=[];particles=[];fragments=[];grenades=[];bombs=[];ripples=[];
    gameState='start';setMC();
  }
});

// ══════════════════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════════════════
let lastT=0;
function loop(ts){
  try{
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;_currentDt=dt;
  // CSS blur overlay — shown for round-end and instructions modal
  const needBlur=gameState==='roundEnd'||(gameState==='start'&&_showInstructions);
  blurOv.style.display=needBlur?'block':'none';
  uiCanvas.style.display=needBlur?'block':'none';
  if(needBlur) uiCtx.clearRect(0,0,W,H);

  ctx.save();
  if(screenShake>0){
    ctx.translate((Math.random()-.5)*screenShake*2,(Math.random()-.5)*screenShake*2);
    screenShake*=0.82;if(screenShake<0.3)screenShake=0;
  }
  ctx.clearRect(-20,-20,W+40,H+40);

  if(gameState==='start'){
    drawStart();
    if(_showInstructions){const _c=ctx;ctx=uiCtx;drawInstructions();ctx=_c;}
  }
  else if(gameState==='charSelect'){drawCharSelect();}
  else {
    drawBG();
    if(gameState==='playing'||gameState==='roundEnd') roundTimer+=dt;

    // Bombs after 5s — every level
    if(roundTimer>5){
      bombSpawnT-=dt;
      if(bombSpawnT<=0){bombs.push(new Bomb());bombSpawnT=4+Math.random()*3;SFX.bomb();}
    }
    // Fire mode after 15s
    if(roundTimer>15&&!fireActive) fireActive=true;
    // Fire particles — single call per frame, rate-limited by particle cap inside
    const fc2=chunks.find(c=>c.id==='flame'&&c.state!=='gone');
    if(fc2&&Math.random()<(fireActive?1:0.45)) spawnFireParticles(fc2);

    for(const c of chunks) c.update(dt);
    for(const ch of characters) ch.update(dt);
    for(const b of bullets) b.update(dt);bullets=bullets.filter(b=>b.alive);
    for(const g of grenades) g.update(dt);grenades=grenades.filter(g=>g.alive);
    for(const b of bombs) b.update(dt);bombs=bombs.filter(b=>b.alive);
    for(const p of particles) p.update(dt);particles=particles.filter(p=>p.life>0);
    for(const f of fragments) f.update(dt);fragments=fragments.filter(f=>f.alpha>0&&f.life>0);
    for(const r of ripples) r.update(dt);ripples=ripples.filter(r=>r.life>0);

    // Draw order
    for(const c of chunks) c.draw();
    ctx.save();
    for(const f of fragments) f.draw();
    for(const p of particles) p.draw();
    ctx.restore();
    for(const r of ripples) r.draw();
    for(const b of bullets) b.draw();
    for(const g of grenades) g.draw();
    for(const b of bombs) b.draw();
    for(const ch of characters) ch.draw();
    drawHUD();
    if(gameState==='roundEnd'){
      roundEndTimer-=dt;
      if(roundEndTimer<=0){resetRound();}
      else{const _c=ctx;ctx=uiCtx;drawRoundEnd();ctx=_c;}
    }
  }
  ctx.restore();
  }catch(e){console.error('loop:',e);}
  requestAnimationFrame(loop);
}

// INIT
// ══════════════════════════════════════════════════════════
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,3);
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
  uiCanvas.width=canvas.width;uiCanvas.height=canvas.height;
  uiCanvas.style.width=W+'px';uiCanvas.style.height=H+'px';
  uiCtx=uiCanvas.getContext('2d');uiCtx.scale(dpr,dpr);
  if(_blurCanvas){_blurCanvas.width=canvas.width;_blurCanvas.height=canvas.height;}
  atmoParticles=[];for(let i=0;i<45;i++) atmoParticles.push(new AtmoParticle());
  if(gameState==='playing'||gameState==='roundEnd'){
    const ox=platX,oy=platY;setupPlat();
    const dx=platX-ox,dy=platY-oy;
    for(const ch of characters){ch.x+=dx;ch.y+=dy;}
  }
  setMC();
}
window.addEventListener('resize',resize);
resize();
requestAnimationFrame(loop);
</script>
